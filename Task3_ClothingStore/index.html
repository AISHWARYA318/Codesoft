<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kira's Fashion Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="container nav">
    <h1 class="logo">Aish's Fashion Hub</h1>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#products">Shop</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>
</header>

<section id="home" class="hero">
  <div class="container">
    <h2>New Collection 2026</h2>
    <p>Style that defines you ✨</p>
    <button id="shopBtn">Shop Now</button>
  </div>
</section>

<section id="products" class="section">
  <div class="container">
    <h2>Featured Products</h2>
    <div class="grid" id="productList"></div>
  </div>
</section>

<section id="about" class="section light">
  <div class="container">
    <h2>About Us</h2>
    <p>We provide stylish and affordable clothing for modern fashion lovers.</p>
    <img src="images/about.jpg" alt="About Store" width="300">
  </div>
</section>

<section id="contact" class="section">
  <div class="container">
    <h2>Contact Us</h2>

    <form id="contactForm">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" required></textarea>
      <button type="submit">Send</button>
    </form>

    <p>Email: Aishfashion@gmail.com</p>
    <p>Phone: +91 9876543210</p>
  </div>
</section>

<footer class="footer">
  <p>© 2026 Aish's Fashion Hub</p>
</footer>

<script src="script.js"></script>
</body>
</html>
